<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ضاغط الصور السريع</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        #downloadBtn {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: none;
            margin-top: 20px;
        }
        img { max-width: 300px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <h2>ضاغط الصور السريع</h2>
    <input type="file" id="upload" accept="image/*">
    <br>
    <img id="preview" alt="الصورة بعد الضغط">
    <br>
    <a id="downloadBtn">تحميل الصورة المضغوطة</a>
    <p id="status"></p>

    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.0/dist/browser-image-compression.js"></script>
    <script>
        const uploadInput = document.getElementById('upload');
        const status = document.getElementById('status');
        const preview = document.getElementById('preview');
        const downloadBtn = document.getElementById('downloadBtn');

        uploadInput.addEventListener('change', async (event) => {
            const imageFile = event.target.files[0];
            if (!imageFile) return;

            status.innerText = "جاري الضغط... انتظر قليلاً";
            
            const options = { maxSizeMB: 0.5, maxWidthOrHeight: 1024, useWebWorker: true };

            try {
                const compressedFile = await imageCompression(imageFile, options);
                
                preview.src = URL.createObjectURL(compressedFile);
                preview.style.display = "inline-block";
                
                downloadBtn.href = URL.createObjectURL(compressedFile);
                downloadBtn.download = "compressed_" + imageFile.name;
                downloadBtn.style.display = "inline-block";
                
                status.innerText = `تم الضغط بنجاح! الحجم الجديد: ${(compressedFile.size / 1024 / 1024).toFixed(2)} MB`;
            } catch (error) {
                status.innerText = "حدث خطأ أثناء الضغط.";
            }
        });
    </script> 
</body>
</html>
