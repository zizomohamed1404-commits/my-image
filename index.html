<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع ضغط الصور</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; background-color: #f9f9f9; }
        .box { background: white; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #ccc; }
        input { margin: 20px 0; }
        #status { font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="box">
    <h1>أداة ضغط الصور</h1>
    <input type="file" id="upload" accept="image/*">
    <p id="status">يرجى اختيار صورة للبدء</p>
</div>

<script>
    document.getElementById('upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        document.getElementById('status').innerText = "تم اختيار الصورة: " + file.name + "\nالحجم الأصلي: " + (file.size / 1024 / 1024).toFixed(2) + " MB";
        
        // هنا يمكنك إضافة منطق الضغط لاحقاً
    });
</script>

</body>
</html>
