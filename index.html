<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ضاغط الصور</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        img { max-width: 300px; display: block; margin: 20px auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>ضاغط الصور</h2>
    <input type="file" id="upload" accept="image/*">
    <img id="preview" style="display:none;">
    <a id="downloadBtn" style="display:none; background: green; color: white; padding: 10px; text-decoration: none;">تحميل الصورة</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.0/dist/browser-image-compression.js"></script>
<script>
    const upload = document.getElementById('upload');
    const preview = document.getElementById('preview');
    const btn = document.getElementById('downloadBtn');

    upload.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        // إظهار نص التحميل
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';

        try {
            const compressedFile = await imageCompression(file, { maxSizeMB: 0.5, maxWidthOrHeight: 1024 });
            btn.href = URL.createObjectURL(compressedFile);
            btn.download = "compressed_" + file.name;
            btn.style.display = 'inline-block';
            alert('تم ضغط الصورة!');
        } catch (err) {
            alert('حدث خطأ في الضغط');
        }
    };
</script>

</body>
</html>
